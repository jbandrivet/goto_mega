name: Build Executables

on:
  push:
    branches: [ main ]
  release:
    types: [created]

jobs:
  build:
    runs-on: ${{ matrix.os }}
    strategy:
      matrix:
        os: [ubuntu-latest, windows-latest]

    steps:
    - uses: actions/checkout@v3

    - name: Set up Python
      uses: actions/setup-python@v4
      with:
        python-version: '3.11'

    - name: Install dependencies
      run: |
        python -m pip install --upgrade pip
        pip install pyinstaller pyserial pillow zwoasi numpy requests

    - name: Build with PyInstaller
      run: |
        pyinstaller --noconfirm --onedir --windowed --add-data "goto_universal_mega:goto_universal_mega" --add-data "goto_universal_raquette:goto_universal_raquette" goto_universal_config_tool.py

    - name: Upload Artifact
      uses: actions/upload-artifact@v3
      with:
        name: GotoUniversaleConfig_${{ matrix.os }}
        path: dist/goto_universal_config_tool
